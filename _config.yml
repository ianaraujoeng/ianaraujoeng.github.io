# Welcome to Jekyll!
# Configuração corrigida por Gemini para Ian Araújo

# Basic Site Settings
locale: "pt-BR"
site_theme: "default"
title: "Ian Araújo Figueiredo | Portfólio"
title_separator: "-"
name: &name "Ian Araújo"
description: &description "Portfólio de projetos de Engenharia Elétrica: projetos residenciais, comerciais, automação industrial e SPDA."
url: "https://ianaraujof.github.io"
baseurl: ""
repository: "ianaraujof/ianaraujof.github.io"

# Site Author
author:
  # Biographic information
  avatar: "Captura de tela 2025-11-27 163937.png"
  name: "Ian Araújo Figueiredo"
  pronouns: "ele/dele"
  bio: "Estudante de Engenharia Elétrica na UFSJ. Entusiasta em projetos elétricos e automação."
  location: "São João Del-Rei, MG"
  employer: "UFSJ"
  email: "ianfigueiredo6@gmail.com"

  # Academic websites (Deixei apenas o que você pode usar)
  googlescholar: 
  orcid: 

  # Repositories and software development
  github: "ianaraujof"
  stackoverflow: 

  # Social media
  linkedin: "ian-araujo-b6111b260"
  instagram: 
  twitter: 

# Publication Category
publication_category:
  books:
    title: 'Livros'
  manuscripts:
    title: 'Artigos'
  conferences:
    title: 'Conferências'

# Site Settings
teaser: 
breadcrumbs: false
words_per_minute: 160
future: true
read_more: "disabled"
talkmap_link: false

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - node_modules
  - package.json
  - LICENSE
  - README
  - tmp
  - vendor
  
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji
